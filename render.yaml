# Render 部署蓝图 - 一键创建所有服务
# 使用方法：在 Render 控制台选择 "Blueprint" 并连接 GitHub 仓库
# 文档：https://render.com/docs/blueprints

services:
  - type: web
    name: peiying-ai-admin
    runtime: docker
    dockerfilePath: ./Dockerfile.prod
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: peiying-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: AUTO_SEED
        value: "true"
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"

databases:
  - name: peiying-db
    plan: free
    databaseName: peiying_ai
